# 复制为 config.toml 后填写。一键起：cargo run --release -- up config.toml
#
# 子命令：
#   up    下载/启动 new-api（配了 [new_api.manage] 时）→ sync 建渠道 → 进入切换循环
#   sync  只建/对齐渠道并打印 name→channel_id，不进循环
#   run   假设 new-api 已在跑，只解析渠道并进入切换循环
#   down  停掉本工具托管的 new-api

poll_interval_secs = 60      # 轮询智谱用量的间隔（秒）

# 活动 key 用量达到这个百分比 → 切换到下一把有额度的 key；也是「有额度」判定线。
throttle_threshold = 95.0
# 挑「新活动 key」时要求用量低于这个值（比 throttle 低，多留余量 → 切换更少 → 缓存更稳）。
restore_threshold = 90.0

dry_run = true               # 先 true 空跑验证日志；确认无误再改 false 真正生效
watch_windows = ["five_hour", "weekly"]   # 同时盯 5 小时和每周窗口，取最大使用率

# 状态看板：浏览器打开 http://127.0.0.1:3001 看每把 key 的 5h/周 用量、档位、当前活动 key。
# 同地址下 /api/status 是 JSON 接口（opencode 插件等外部消费者读它）。留空则不启用看板。
status_addr = "127.0.0.1:3001"

# 三档 priority（一般不用改）。new-api 优先路由最高 priority 的渠道：
# active 独占最高档吃走所有正常流量；standby 作 429 兜底；exhausted 是最后手段。
priority_active = 100
priority_standby = 10
priority_exhausted = 0

[zhipu]
# ⚠️ 团体套餐必须带 ?type=2（团队额度作用域），否则返回「当前用户不存在coding plan」。
#    个人套餐去掉 ?type=2。国际版 z.ai 换主机。鉴权用 Authorization: Bearer <key>（程序内置）。
quota_url = "https://open.bigmodel.cn/api/monitor/usage/quota/limit?type=2"

# 全局兜底 selector（各 key 未单独配 quota_headers 时用这个）。个人套餐不需要。
# [[zhipu.extra_headers]]
# key = "Bigmodel-Organization"
# value = "org-..."

[new_api]
base_url = "http://127.0.0.1:3000"
channel_path = "/api/channel"
# 管理认证：① 若你已有 new-api 并生成了“系统访问令牌”，填这里，本工具用 Bearer 调管理 API；
#           ② 留空则用下面 root 账号登录（配合 [new_api.manage] 首启自动建管理员）。
admin_token = ""
# admin_token 为空时用它登录 new-api。首启会用它创建管理员（密码需 ≥8 位）。请改成你自己的。
root_username = "root"
root_password = "changeme123"

# —— 让本工具自己下载并托管 new-api 原生进程（不用容器）——
# 配了这段，up/sync 会在 new-api 不在跑时按平台下载 release 二进制（sha256 校验）并启动。
# 不想让本工具管 new-api（自己部署）就删掉整段 [new_api.manage]，用 run 子命令。
[new_api.manage]
version = "v1.0.0-rc.20"     # GitHub release tag
port = 3000                  # 应与 base_url 端口一致
data_dir = "./.newapi"       # 二进制 / SQLite / 日志 / PID 都放这里
repo = "QuantumNous/new-api"

# —— sync 建渠道用的模板（版本相关字段，建议 F12 对齐）——
# sync 会把每把 key 的 name/key 合并进来，一 key 一渠道；有它才能自动建渠道。
[new_api.channel_template]
# 智谱编码套餐口是 /coding/paas/v4/chat/completions（/v4 不是 /v1）。已实测：必须用 Custom
# 类型(8) 原样透传全路径；OpenAI 类型(1) 会拼成 /v4/v1/... 报 404。
type = 8
base_url = "https://open.bigmodel.cn/api/coding/paas/v4/chat/completions"
# opencode zhipuai-coding-plan 的全部模型（取自 models.dev）
models = "glm-4.7,glm-5.1,glm-5.2,glm-5-turbo,glm-5v-turbo,glm-4.6v,glm-4.5-air"
group = "default"

# —— 一把智谱 key = 一个独立渠道 ——
# name 同时用作 new-api 渠道名，sync 靠它解析/创建渠道。channel_id 可留空，交给 sync 自动解析。
# 只有 >=2 把 key 时本工具才有意义（轮着用）。
[[keys]]
name = "zhipu-1"
zhipu_api_key = "第一把智谱 key"
# channel_id = 1   # 可选：已有渠道时显式指定；留空则按 name 自动解析/创建
# —— 团体套餐必需的 selector；不同 key 可能属不同组织/项目，故按 key 配 ——
# 取法：浏览器打开 https://bigmodel.cn/coding-plan/team/usage-stats → F12 Network →
#       刷新 → 找 api/monitor/usage/quota/limit 请求 → 复制它带的这两个请求头
[[keys.quota_headers]]
key = "Bigmodel-Organization"
value = "org-..."
[[keys.quota_headers]]
key = "Bigmodel-Project"
value = "proj_..."

[[keys]]
name = "zhipu-2"
zhipu_api_key = "第二把智谱 key"
[[keys.quota_headers]]
key = "Bigmodel-Organization"
value = "org-..."
[[keys.quota_headers]]
key = "Bigmodel-Project"
value = "proj_..."
